services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://eyewear-backend.xyz}
        VITE_APP_NAME: ${VITE_APP_NAME:-Eyewear Shop}
    container_name: eyewear-frontend
    ports:
      - '3000:3000'
    restart: always
    deploy:
      resources:
        limits:
          memory: 800M
