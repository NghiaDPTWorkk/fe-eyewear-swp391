server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Với assets hash của Vite: nếu không tồn tại thì PHẢI trả 404,
    # không fallback về index.html (tránh lỗi dynamic import nhận HTML thay vì JS)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # File tĩnh khác (ảnh, font, model...) cũng trả 404 nếu thiếu
    location ~* \.(?:js|mjs|css|map|json|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?|ttf|eot|glb|hdr|webm)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # HTML shell luôn revalidate để tránh giữ reference chunk cũ sau deploy
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback chỉ áp dụng cho route app, không áp dụng cho asset files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy các yêu cầu API sang backend (nếu có)
    # location /api {
    #     proxy_pass http://backend:8080/api;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        try_files $uri =404;
    }
}
